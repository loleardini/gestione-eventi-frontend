<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy - Corsi Aziendali</title>
    <meta name="description" content="Gestione iscrizioni e check-in per eventi di formazione">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <nav class="navbar" id="navbar" style="display: none;">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fa-solid fa-graduation-cap"></i> <span>Academy Aziendale</span>
            </div>
            <div class="nav-menu">
                <span id="user-welcome" class="user-welcome"></span>
                <a href="#" id="nav-dashboard" class="nav-link active"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
                <a href="#" id="nav-stats" class="nav-link" style="display: none;"><i class="fa-solid fa-chart-pie"></i> Statistiche</a>
                <a href="#" id="nav-logout" class="nav-link logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </div>
        </div>
    </nav>
    <main id="app-container" class="app-container">
    </main>
    <template id="tpl-login">
        <div class="auth-wrapper">
            <div class="auth-box fade-in">
                <div class="auth-header">
                    <div class="auth-icon"><i class="fa-solid fa-user-lock"></i></div>
                    <h2>Area Riservata</h2>
                    <p>Accedi o registrati per gestire i tuoi corsi</p>
                </div>
                <div class="tabs">
                    <button class="tab-btn active" data-target="form-login">Accedi</button>
                    <button class="tab-btn" data-target="form-register">Registrati</button>
                </div>
                <form id="form-login" class="auth-form active">
                    <div class="input-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required placeholder="mario.rossi@azienda.it">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Accedi <i class="fa-solid fa-arrow-right"></i></button>
                </form>
                <form id="form-register" class="auth-form" style="display: none;">
                    <div class="input-group">
                        <label for="reg-nome">Nome</label>
                        <input type="text" id="reg-nome" required placeholder="Mario">
                    </div>
                    <div class="input-group">
                        <label for="reg-cognome">Cognome</label>
                        <input type="text" id="reg-cognome" required placeholder="Rossi">
                    </div>
                    <div class="input-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" required placeholder="mario.rossi@azienda.it">
                    </div>
                    <div class="input-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required placeholder="••••••••">
                    </div>
                    <div class="input-group">
                        <label for="reg-ruolo">Ruolo</label>
                        <select id="reg-ruolo" required>
                            <option value="Dipendente">Dipendente</option>
                            <option value="Organizzatore">Organizzatore</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Registrati <i class="fa-solid fa-user-plus"></i></button>
                </form>
            </div>
        </div>
    </template>
    <template id="tpl-dashboard-dipendente">
        <div class="dashboard dipendente fade-in">
            <div class="page-header">
                <h1>I tuoi Eventi di Formazione</h1>
                <p>Visualizza gli eventi disponibili e gestisci le tue iscrizioni</p>
            </div>
            <div class="grid-layout">
                <section class="card">
                    <div class="card-header">
                        <h2><i class="fa-regular fa-calendar"></i> Eventi Disponibili</h2>
                    </div>
                    <div class="card-body">
                        <div id="lista-eventi-d" class="lista-items">
                            <div class="loader">Caricamento eventi...</div>
                        </div>
                    </div>
                </section>
                <section class="card">
                    <div class="card-header highlight">
                        <h2><i class="fa-solid fa-ticket"></i> Le Tue Iscrizioni</h2>
                    </div>
                    <div class="card-body">
                        <div id="lista-iscrizioni" class="lista-items">
                            <div class="loader">Caricamento iscrizioni...</div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </template>
    <template id="tpl-dashboard-organizzatore">
        <div class="dashboard organizzatore fade-in">
            <div class="page-header header-flex">
                <div>
                    <h1>Gestione Eventi Formativi</h1>
                    <p>Area organizzatore per la creazione di eventi e check-in dei partecipanti</p>
                </div>
                <button id="btn-nuovo-evento" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Nuovo Evento</button>
            </div>
            <div id="modal-evento" class="modal-overlay" style="display: none;">
                <div class="modal-box card slide-up">
                    <div class="card-header">
                        <h2 id="modal-title">Crea Nuovo Evento</h2>
                        <button id="btn-close-modal" class="btn-icon"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="card-body">
                        <form id="form-evento">
                            <input type="hidden" id="ev-id">
                            <div class="input-group">
                                <label for="ev-titolo">Titolo Evento</label>
                                <input type="text" id="ev-titolo" required placeholder="Es. Corso Sicurezza sul Lavoro">
                            </div>
                            <div class="input-group">
                                <label for="ev-data">Data e Ora</label>
                                <input type="datetime-local" id="ev-data" required>
                            </div>
                            <div class="input-group">
                                <label for="ev-desc">Descrizione</label>
                                <textarea id="ev-desc" rows="3" required placeholder="Dettagli dell'evento..."></textarea>
                            </div>
                            <div class="form-actions">
                                <button type="button" id="btn-cancel-evento" class="btn btn-secondary">Annulla</button>
                                <button type="submit" class="btn btn-primary">Salva Evento</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="grid-layout">
                <section class="card eventi-list-card">
                    <div class="card-header">
                        <h2>Lista Eventi (Tutti)</h2>
                    </div>
                    <div class="card-body">
                        <div id="lista-eventi-org" class="lista-items">
                            <div class="loader">Caricamento eventi...</div>
                        </div>
                    </div>
                </section>
                <section id="panel-checkin" class="card checkin-card" style="display:none;">
                    <div class="card-header highlight">
                        <h2><i class="fa-solid fa-clipboard-check"></i> Gestione Check-in</h2>
                        <span id="checkin-titolo-evento" class="badge">Seleziona un evento</span>
                    </div>
                    <div class="card-body">
                        <div class="checkin-stats" id="checkin-stats-counter">
                        </div>
                        <div id="lista-partecipanti-checkin" class="lista-items participants">
                            <p class="text-muted">Seleziona "Gestisci Check-in" su un evento.</p>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </template>
    <template id="tpl-statistiche">
        <div class="dashboard stats-page fade-in">
            <div class="page-header">
                <h1>Statistiche Partecipazione</h1>
                <p>Eventi passati, presenze e percentuale di partecipazione</p>
            </div>
            <div class="card filter-card">
                <form id="form-filtri" class="filters-form">
                    <div class="input-group inline">
                        <label for="filtro-dal">Dal:</label>
                        <input type="date" id="filtro-dal">
                    </div>
                    <div class="input-group inline">
                        <label for="filtro-al">Al:</label>
                        <input type="date" id="filtro-al">
                    </div>
                    <button type="submit" class="btn btn-secondary"><i class="fa-solid fa-filter"></i> Filtra</button>
                    <button type="button" id="btn-reset-filtri" class="btn btn-text">Reset</button>
                </form>
            </div>
            <div class="card shadow-md" style="margin-top: 2rem;">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Evento</th>
                                    <th>Data</th>
                                    <th class="text-center">Iscritti</th>
                                    <th class="text-center">Check-in Effettuati</th>
                                    <th>Partecipazione (%)</th>
                                </tr>
                            </thead>
                            <tbody id="tabella-statistiche">
                                <tr><td colspan="5" class="text-center">Caricamento in corso...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div id="chart-container" style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                    </div>
                </div>
            </div>
        </div>
    </template>
    <script src="js/app.js"></script>
</body>
</html>
